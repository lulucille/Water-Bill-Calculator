<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Water Billing Statement</h1>
    <form id = "waterbill">
        <label>Customer Name</label>
        <input  type = "text" id = "name" ></input> <br>

        <label>Water Consumption (Cubic Meter)</label>
        <input type = "number" id = "consumption" ></input> <br>

        <label>Customer Type</label>
        <select name="" id="customer">
            <option value = "">Select</option>
            <option value = "Regular">Regular</option>
            <option value = "Senior Citizen">Senior Citizen</option>
            <option value = "Solo Parent">Solo Parent</option>
        </select><br>

        <button class = "btn1" type = "submit" id = "submit">Generate Bill</button>
        <button class = "btn2" type = "reset" id = "reset">Reset</button>

        <div id="output">
        <h2>Transaction Process: <span id="transactionCount">0</span></h2>

    
        <p>Total Amount: <span id="totalAmount">0.00</span></p>
        <p>Discount: <span id="discountAmount">0.00</span></p>
        <p>Final Amount: <span id="finalAmount">0.00</span></p>
    </div>
    </form>



<script src = "script.js"></script>
</body>
</html>
